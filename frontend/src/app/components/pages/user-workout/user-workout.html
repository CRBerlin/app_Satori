<div class="container-fluid py-3">
    <h3 class="fw-bold mb-4 text-center text-md-start">
        Tu entrenamiento 💪
    </h3>
    @if (plan) {
    <div class="row g-4">
        @for (exercise of plan.sessions[0].exercises; track exercise._id) {
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0">
                <!-- VIDEO -->
                <div class="ratio ratio-16x9">
                    <iframe [src]="getEmbedUrl(exercise.exerciseId.videoUrl)" allowfullscreen>
                    </iframe>
                </div>
                <!-- BODY -->
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold text-center text-md-start">
                        {{ exercise.exerciseId.name }}
                    </h5>
                    <p class="text-muted text-center text-md-start mb-3">
                        {{ exercise.sets }} sets ·
                        {{ exercise.reps }} reps ·
                        {{ exercise.restSeconds }} seg
                    </p>
                    <!-- BOTÓN -->
                    <div class="mt-auto text-center">
                        <button class="btn btn-success w-100">
                            ✔ Completado
                        </button>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
    } @else {
    <div class="text-center mt-5">
        <p class="text-muted">No tienes plan asignado</p>
    </div>
    }
</div>

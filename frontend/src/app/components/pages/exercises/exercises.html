<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="fw-bold">Ejercicios</h3>
</div>

<div class="card shadow-sm">
  <div class="card-body">

    <!-- Toolbar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <button class="btn btn-nuevoEjercicio" data-bs-toggle="modal" data-bs-target="#modalNuevoEjercicio">
        <i class="bi bi-plus-lg me-1"></i> Nuevo Ejercicio
      </button>

      <div class="input-group" style="width: 250px;">
        <input type="text" class="form-control" placeholder="Buscar ejercicio...">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
      </div>
    </div>

    <!-- Tabla -->
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>Nombre</th>
          <th>Grupo</th>
          <th>Dificultad</th>
          <th>Video</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>
        @for (exercise of exercises; track exercise._id) {
        <tr>
          <td class="fw-semibold">{{ exercise.name }}</td>
          <td>{{ exercise.muscleGroup }}</td>
          <td>{{ exercise.difficulty }}</td>

          <td>
            <a [href]="exercise.videoUrl" target="_blank">Ver</a>
          </td>

          <td class="text-center">
            <button class="btn btn-sm btn-outline-warning me-1">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>

  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalNuevoEjercicio" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Ejercicio</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <form>

          <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input id="name" type="text" class="form-control" [(ngModel)]="exercise.name" name="name">

            @if (!exercise.name) {
            <small class="text-danger">Nombre requerido</small>
            }
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Descripción</label>
            <textarea id="description" class="form-control" [(ngModel)]="exercise.description"
              name="description"></textarea>
          </div>

          <div class="mb-3">
            <label for="videoUrl" class="form-label">Video URL</label>
            <input id="videoUrl" type="text" class="form-control" [(ngModel)]="exercise.videoUrl" name="videoUrl">
          </div>

          <div class="mb-3">
            <label for="muscleGroup" class="form-label">Grupo muscular</label>
            <input id="muscleGroup" type="text" class="form-control" [(ngModel)]="exercise.muscleGroup"
              name="muscleGroup">
          </div>

          <div class="mb-3">
            <label for="difficulty" class="form-label">Dificultad</label>
            <select id="difficulty" class="form-select" [(ngModel)]="exercise.difficulty" name="difficulty">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </form>
      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>

        <button class="btn btn-danger" data-bs-dismiss="modal" (click)="createExercise()" [disabled]="!exercise.name">
          Crear Ejercicio
        </button>
      </div>
    </div>
  </div>
</div>

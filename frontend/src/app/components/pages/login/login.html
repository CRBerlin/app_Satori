<div class="d-flex justify-content-center align-items-center loginBody">
    <div class="card p-4 shadow-lg loginCard">
        <!-- Título -->
        <h2 class="text-center fw-bold mb-1">SATORI</h2>
        <p class="text-center text-muted mb-2">MARCA, ENTRENA, TRASCIENDE</p>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <!-- EMAIL -->
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control" formControlName="email" placeholder="correo@ejemplo.com"
                    name="email">

                @if (form.get('email')?.touched && form.get('email')?.invalid) {
                <small class="text-danger d-flex align-items-center gap-1 mt-1">
                    ⚠ Email inválido
                </small>
                }
            </div>
            <!-- PASSWORD -->
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="••••••"
                    name="password">

                @if (form.get('password')?.touched && form.get('password')?.invalid) {
                <small class="text-danger d-flex align-items-center gap-1 mt-1">
                    ⚠ Mínimo 4 caracteres
                </small>
                }
            </div>
            <!-- ERROR BACK -->
            @if (error) {
            <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
                ⚠ {{ error }}
            </div>
            }
            <!-- BOTÓN -->
            <button type="submit" class="btn w-100 d-flex justify-content-center align-items-center gap-2"
                [disabled]="loading">
                @if (loading) {
                <span class="spinner-border spinner-border-sm"></span>
                Cargando...
                } @else {
                Iniciar sesión
                }
            </button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">
                ¿No tienes cuenta?
                <!-- Se deja comentario para cuando se cree la funcionalidad de registro, ya que no se ha implementado en el backend. -->
                <!-- <a class="ms-1 text-primary fw-semibold" style="cursor: pointer;" (click)="goToRegister()"> -->
                <a class="ms-1 text-primary fw-semibold" style="cursor: pointer;">
                    Regístrate
                </a>
            </small>
        </div>
    </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Empleados</h3>
</div>

<div class="card shadow-sm">
    <div class="card-body">

        <!-- Toolbar -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-nuevoEmpleado" (click)="isEditMode = false" data-bs-toggle="modal"
                data-bs-target="#modalEmpleado">
                <i class="bi bi-plus-lg me-1"></i> Nuevo Empleado
            </button>
        </div>

        <!-- Tabla -->
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Apellido 1</th>
                    <th>Apellido 2</th>
                    <th>Departamento</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>

            <tbody>
                @for (emp of employees; track emp.employeeCode) {
                <tr>
                    <td>{{ emp.employeeCode }}</td>
                    <td>{{ emp.firstName }}</td>
                    <td>{{ emp.lastName1 }}</td>
                    <td>{{ emp.lastName2 }}</td>
                    <td>{{ emp.departmentCode }}</td>

                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-warning me-1" (click)="editEmployee(emp)"
                            data-bs-toggle="modal" data-bs-target="#modalEmpleado">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" (click)="deleteEmployee(emp.employeeCode)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                }
            </tbody>
        </table>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalEmpleado" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Nuevo Empleado</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form [formGroup]="form">

                    <input class="form-control mb-2" placeholder="Código" formControlName="employeeCode">
                    <input class="form-control mb-2" placeholder="Nombre" formControlName="firstName">
                    <input class="form-control mb-2" placeholder="Apellido 1" formControlName="lastName1">
                    <input class="form-control mb-2" placeholder="Apellido 2" formControlName="lastName2">
                    <input class="form-control mb-3" placeholder="Código Departamento" formControlName="departmentCode">

                </form>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

                <button class="btn btn-primary" (click)="isEditMode ? updateEmployee() : createEmployee()"
                    [disabled]="form.invalid">

                    {{ isEditMode ? 'Actualizar' : 'Crear' }}
                </button>
            </div>

        </div>
    </div>
</div>

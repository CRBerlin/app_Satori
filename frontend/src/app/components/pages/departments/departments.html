<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Departamentos</h3>
</div>

<div class="card shadow-sm">
    <div class="card-body">

        <!-- Toolbar -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-nuevoDepartamento" (click)="isEditMode = false" data-bs-toggle="modal"
                data-bs-target="#modalDepartment">
                <i class="bi bi-plus-lg me-1"></i> Nuevo Departamento
            </button>
        </div>

        <!-- Tabla -->
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Cantidad de empleados</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>

            <tbody>
                @for (dep of departments; track dep.departmentCode) {
                <tr>
                    <td class="text-center">{{ dep.departmentCode }}</td>
                    <td>
                        <a class="link-dept" [routerLink]="['/departments', dep.departmentCode]">
                            {{ dep.departmentName }}
                        </a>
                    </td>

                    <td>{{ getEmployeeCount(dep.departmentCode) }}</td>

                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-warning me-1" (click)="editDepartment(dep)"
                            data-bs-toggle="modal" data-bs-target="#modalDepartment">

                            <i class="bi bi-pencil"></i>
                        </button>

                        <button class="btn btn-sm btn-outline-danger" (click)="deleteDepartment(dep.departmentCode)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                }
            </tbody>
        </table>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalDepartment" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    {{ isEditMode ? 'Editar Departamento' : 'Nuevo Departamento' }}
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form [formGroup]="form">

                    <input class="form-control mb-2" placeholder="Código" formControlName="departmentCode"
                        [readonly]="isEditMode">

                    <input class="form-control mb-3" placeholder="Nombre" formControlName="departmentName">

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

                <button class="btn btn-primary" (click)="isEditMode ? updateDepartment() : createDepartment()"
                    [disabled]="form.invalid">

                    {{ isEditMode ? 'Actualizar' : 'Crear' }}
                </button>
            </div>

        </div>
    </div>
</div>
